<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Modern Snake</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <main class="app">
    <header class="hud">
      <h1>Snake</h1>
      <div class="scoreboard">
        <p><span class="label">Score</span><span id="score">0</span></p>
        <p><span class="label">High</span><span id="high-score">0</span></p>
      </div>
      <div class="settings-menu">
        <label for="theme-select">Theme</label>
        <select id="theme-select">
          <option value="dark">Dark</option>
          <option value="neon">Neon</option>
          <option value="retro">Retro</option>
        </select>
      </div>
      <button id="pause-btn" type="button" class="ghost-btn">Pause (P)</button>
    </header>

    <section class="board-shell">
      <canvas id="game-canvas" width="600" height="600" aria-label="Snake game canvas"></canvas>
      <div id="overlay" class="overlay" aria-live="polite">
        <h2 id="overlay-title">Modern Snake</h2>
        <p id="overlay-message">Press Start to begin</p>
        <div id="name-entry" class="name-entry hidden">
          <label for="player-name">Name</label>
          <input id="player-name" type="text" maxlength="10" autocomplete="nickname" />
          <button id="save-score-btn" type="button">Save Score</button>
        </div>
        <section id="leaderboard-panel" class="leaderboard-panel hidden" aria-label="Leaderboard">
          <ul id="leaderboard-list"></ul>
          <button id="back-menu-btn" type="button">Back to Menu</button>
        </section>
        <div class="overlay-actions">
          <button id="overlay-action" type="button">Start</button>
          <button id="view-leaderboard-btn" type="button">Leaderboard</button>
        </div>
      </div>
    </section>

    <section class="control-row" aria-label="Direction controls">
      <button type="button" data-dir="UP">Up</button>
      <button type="button" data-dir="LEFT">Left</button>
      <button type="button" data-dir="DOWN">Down</button>
      <button type="button" data-dir="RIGHT">Right</button>
    </section>

    <p class="hint">Arrow keys or swipe to move, <strong>P</strong> pauses, <strong>Enter</strong> restarts.</p>
  </main>

  <script type="module" src="./src/main.js"></script>
</body>
</html>
