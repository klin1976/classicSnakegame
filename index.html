<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Classic Snake</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <main class="container">
    <section class="topbar">
      <div class="lang-picker">
        <label id="language-label" for="language-select">Language</label>
        <select id="language-select" aria-label="Language">
          <option value="zh-TW">繁體中文</option>
          <option value="zh-CN">简体中文</option>
          <option value="en">English</option>
          <option value="ja">日本語</option>
          <option value="ko">한국어</option>
          <option value="th">ไทย</option>
          <option value="es">Español</option>
        </select>
      </div>
    </section>

    <h1 id="title-text">Classic Snake</h1>

    <section id="start-screen" class="start-screen">
      <p id="start-message">Press Start to play.</p>
      <button id="start-btn" type="button">Start</button>
    </section>

    <section class="hud">
      <p><span id="score-label">Score</span>: <span id="score">0</span></p>
      <p><span id="high-label">High</span>: <span id="high-score">0</span></p>
      <p id="status" class="status">Ready</p>
    </section>

    <section id="board" class="board" aria-label="Snake game board" role="grid"></section>

    <section class="actions">
      <button id="pause-btn" type="button">Pause</button>
      <button id="restart-btn" type="button">Restart</button>
      <button id="demo-btn" type="button">Demo: OFF</button>
    </section>

    <section class="modes" aria-label="Game modes">
      <label>
        <input id="wrap-mode" type="checkbox" />
        <span id="wrap-label">Wrap Walls</span>
      </label>
      <label>
        <input id="special-food-mode" type="checkbox" />
        <span id="special-label">Special Food</span>
      </label>
      <label>
        <input id="obstacle-mode" type="checkbox" />
        <span id="obstacle-label">Obstacles</span>
      </label>
    </section>

    <section class="controls" aria-label="Directional controls">
      <button type="button" data-direction="UP" id="btn-up">Up</button>
      <div class="middle-row">
        <button type="button" data-direction="LEFT" id="btn-left">Left</button>
        <button type="button" data-direction="DOWN" id="btn-down">Down</button>
        <button type="button" data-direction="RIGHT" id="btn-right">Right</button>
      </div>
    </section>

    <p class="hint" id="hint-text">Use Arrow keys or WASD. Restart resets direction and speed.</p>
  </main>
  <script type="module" src="./src/game.js"></script>
</body>
</html>
